<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>MaintainX</title>

    <!-- bootstrap -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Bootstrap Icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
</head>

<body class="p-4">

<!-- ===================== LOGIN VIEW ===================== -->
<div class="container mt-5" id="loginView" style="max-width: 360px;">
    <h4 class="text-center">MaintainX</h4>
    <p class="text-center">Login</p>

    <label for="username">Username</label>
    <input class="form-control mb-3" id="username" placeholder="Username">

    <label for="password">Password</label>
    <input class="form-control mb-3" id="password" placeholder="Password" type="password">

    <button class="btn btn-primary w-100" id="loginBtn">Login</button>
</div>

<!-- ===================== Network Element ===================== -->
<div class="d-none" id="homeView">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="m-0">MaintainX</h4>
        <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">
            <i class="bi bi-box-arrow-right me-1"></i> Logout
        </button>
    </div>

    <button aria-controls="addElementPanel" aria-expanded="false"
            class="btn btn-primary btn-sm" data-bs-target="#addElementPanel"
            data-bs-toggle="collapse" type="button">
        <i class="bi bi-plus-lg me-1"></i> Add Network Element
    </button>

    <div class="d-flex justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="collapse mt-3" id="addElementPanel">
                <div class="card border-primary">
                    <div class="card-header bg-primary text-white py-2">
                        <span class="fw-semibold">Add Network Element</span>
                    </div>

                    <div class="card-body">

                        <div class="mb-2">
                            <label class="form-label small" for="neCode">Element Code</label>
                            <input class="form-control form-control-sm" id="neCode" placeholder="NE-001">
                        </div>

                        <div class="mb-2">
                            <label class="form-label small" for="neName">Name</label>
                            <input class="form-control form-control-sm" id="neName" placeholder="Dublin Core Router">
                        </div>

                        <div class="mb-2">
                            <label class="form-label small" for="neType">Device Type</label>
                            <select class="form-select form-select-sm" id="neType">
                                <option disabled selected value="">Select device type</option>
                                <option value="CORE_ROUTER">Core Router</option>
                                <option value="EDGE_SWITCH">Edge Switch</option>
                                <option value="ACCESS_SWITCH">Access Switch</option>
                                <option value="AGGREGATION_SWITCH">Aggregation Switch</option>
                                <option value="BACKBONE_FIREWALL">Backbone Firewall</option>
                            </select>
                        </div>

                        <div class="mb-2">
                            <label class="form-label small" for="neRegion">Region</label>
                            <select class="form-select form-select-sm" id="neRegion">
                                <option disabled selected value="">Select region</option>
                                <option value="DUBLIN">Dublin</option>
                                <option value="CORK">Cork</option>
                                <option value="GALWAY">Galway</option>
                                <option value="DONEGAL">Donegal</option>
                                <option value="NATIONWIDE">Nationwide</option>
                            </select>
                        </div>

                        <div class="mb-2">
                            <span class="form-label small d-block">Status</span>

                            <div class="form-check form-check-inline">
                                <input checked class="form-check-input" id="statusActive" name="neStatus"
                                       type="radio" value="ACTIVE">
                                <label class="form-check-label small" for="statusActive">Active</label>
                            </div>

                            <div class="form-check form-check-inline">
                                <input class="form-check-input" id="statusDeactive" name="neStatus" type="radio"
                                       value="DEACTIVE">
                                <label class="form-check-label small text-danger" for="statusDeactive">Deactive</label>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button class="btn btn-outline-secondary btn-sm" data-bs-target="#addElementPanel"
                                    data-bs-toggle="collapse" type="button">
                                Cancel
                            </button>
                            <button class="btn btn-primary btn-sm" id="saveElementBtn" type="button">Save</button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <h6 class="mb-2">Network Elements</h6>
        <table class="table table-striped table-sm" id="neTable">
            <thead>
            <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Type</th>
                <th>Region</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<!-- Bootstrap bundle is needed for collapse to work -->
<script crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>
</body>
</html>
