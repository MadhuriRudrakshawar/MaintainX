<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>MaintainX</title>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

</head>
<body>
<body class="p-4">


<button class="btn btn-primary btn-sm" type="button"
        data-bs-toggle="collapse" data-bs-target="#addElementPanel"
        aria-expanded="false" aria-controls="addElementPanel">
    <i class="bi bi-plus-lg me-1"></i> Add Network Element
</button>
<div class="d-flex justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="collapse mt-3" id="addElementPanel">
            <div class="card border-primary">
                <div class="card-header bg-primary text-white py-2">
                    <span class="fw-semibold">Add Network Element</span>
                </div>

                <div class="card-body">

                    <div class="mb-2">
                        <label class="form-label small" for="neCode">Element Code</label>
                        <input id="neCode" class="form-control form-control-sm" placeholder="NE-001">
                    </div>

                    <div class="mb-2">
                        <label class="form-label small" for="neName">Name</label>
                        <input id="neName" class="form-control form-control-sm" placeholder="Dublin Core Router">
                    </div>

                    <div class="mb-2">
                        <label class="form-label small" for="neType">Device Type</label>
                        <select id="neType" class="form-select form-select-sm">
                            <option value="" selected disabled>Select device type</option>
                            <option value="CORE_ROUTER">Core Router</option>
                            <option value="EDGE_SWITCH">Edge Switch</option>
                            <option value="ACCESS_SWITCH">Access Switch</option>
                            <option value="AGGREGATION_SWITCH">Aggregation Switch</option>
                            <option value="BACKBONE_FIREWALL">Backbone Firewall</option>
                        </select>
                    </div>

                    <div class="mb-2">
                        <label class="form-label small" for="neRegion">Region</label>
                        <select id="neRegion" class="form-select form-select-sm">
                            <option value="" selected disabled>Select region</option>
                            <option value="DUBLIN">Dublin</option>
                            <option value="CORK">Cork</option>
                            <option value="GALWAY">Galway</option>
                            <option value="DONEGAL">Donegal</option>
                            <option value="NATIONWIDE">Nationwide</option>
                        </select>
                    </div>

<div id="loginView" class="container mt-5" style="max-width: 360px;">
    <h4 class="text-center">MaintainX</h4>
    <p class="text-center">Login</p>
                    <div class="mb-2">
                        <span class="form-label small d-block">Status</span>

    <label for="username">Username</label>
    <input id="username" class="form-control mb-3" placeholder="Username">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="neStatus" id="statusActive" value="ACTIVE" checked>
                            <label class="form-check-label small" for="statusActive">Active</label>
                        </div>

    <label for="password">Password</label>
    <input id="password" type="password" class="form-control mb-3" placeholder="Password">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="neStatus" id="statusDeactive" value="DEACTIVE">
                            <label class="form-check-label small text-danger" for="statusDeactive">Deactive</label>
                        </div>
                    </div>

    <button id="loginBtn" class="btn btn-primary w-100">Login</button>
</div>

<div id="homeView" class="bg-dark text-white d-none" style="min-height:100vh;">
    <div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
        <button id="logoutBtn" class="btn btn-light">Logout</button>
    </div>
</div>

                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <button class="btn btn-outline-secondary btn-sm" type="button"
                                data-bs-toggle="collapse" data-bs-target="#addElementPanel">
                            Cancel
                        </button>
                        <button id="saveElementBtn" class="btn btn-primary btn-sm" type="button">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-4">
    <h6 class="mb-2">Network Elements</h6>
    <table id="neTable" class="table table-striped table-sm">
        <thead>
        <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Type</th>
            <th>Region</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>


<!-- Bootstrap JS  -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
</body>

</html>
