spring.application.name=MaintainX
server.port=8081
spring.datasource.url=${DB_URL:jdbc:h2:file:./db/maintainx;MODE=MySQL;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
#JWT
security.jwt.secret=${JWT_SECRET:dev-only-jwt-secret-change-me-before-prod-12345}
security.jwt.expirationSeconds=3600
