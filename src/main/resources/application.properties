spring.application.name=MaintainX
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/maintainx_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
#JWT
security.jwt.secret=${JWT_SECRET:dev-only-jwt-secret-change-me-before-prod-12345}
security.jwt.expirationSeconds=3600
